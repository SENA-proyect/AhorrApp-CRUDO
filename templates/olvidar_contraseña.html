<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Olvidaste tu contraseña?</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/olvidar_contraseña.css') }}">

</head>
<body>
    <header>
    <h1>Restablecer contraseña</h1>
    </header>
    <main>
    <div class="container">


        <h3>Introduce el correo electrónico asociado a tu cuenta y te enviaremos las instrucciones para restablecerla.</h3>

        <form action="{{ url_for ('olvidar_contraseña') }}" class="form" method="post">

            <div class="form_correo">

                <input type="email" name="email" placeholder="Ingrese su correo electronico" class="correo" required>

            </div>

            <div class="form_button">

                <a class="salir" href="{{ url_for('login') }}">Cancelar</a>
                <button class="enviar">Enviar</button>
            </div>
        </form>
    </div>
    </main>
    <footer>

    </footer>
</body>
</html>
