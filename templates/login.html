<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahorrapp — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,600;9..144,1,300;9..144,1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

  <div class="page">

    <!-- ── PANEL IZQUIERDO ── -->
    <div class="panel-left">
      <div class="panel-left__inner">

        <div class="brand">
          <div class="brand__icon">
            <svg width="24" height="24" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 3C8 3 4 8 4 14s4 11 10 11 10-5 10-11S20 3 14 3z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
              <path d="M9 14c0-2.8 2.2-5 5-5s5 2.2 5 5-2.2 5-5 5" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <circle cx="14" cy="14" r="2" fill="white"/>
            </svg>
          </div>
          <span class="brand__name">ahorrapp</span>
        </div>

        <div class="panel-left__content">
          <p class="panel-left__eyebrow">Finanzas personales</p>
          <h1 class="panel-left__headline">
            Tu dinero,<br>
            bajo <em>control.</em>
          </h1>
          <p class="panel-left__sub">
            Registra ingresos, ahorros, gastos e imprevistos en un solo lugar.
          </p>
        </div>

        <div class="panel-left__stats">
          <div class="stat">
            <span class="stat__num">+12k</span>
            <span class="stat__label">usuarios activos</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat__num">98%</span>
            <span class="stat__label">satisfacción</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat">
            <span class="stat__num">$0</span>
            <span class="stat__label">costo de uso</span>
          </div>
        </div>

      </div>

      <!-- Decoración de fondo -->
      <div class="deco deco--1"></div>
      <div class="deco deco--2"></div>
      <div class="deco deco--3"></div>
    </div>

    <!-- ── PANEL DERECHO ── -->
    <div class="panel-right">
      <div class="form-card">

        <div class="form-header">
          <h2 class="form-header__title">Bienvenido de nuevo</h2>
          <p class="form-header__sub">Ingresa tus datos para continuar</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="form">

          <div class="field">
            <label class="field__label" for="email">Correo electrónico</label>
            <div class="field__wrap">
              <svg class="field__icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
                <path d="M2.5 5.5h15v10a1 1 0 01-1 1h-13a1 1 0 01-1-1v-10z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M2.5 5.5l7.5 6 7.5-6" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
              <input class="field__input" type="email" id="email" name="email" placeholder="tu@correo.com" autocomplete="email" required>
            </div>
          </div>

          <div class="field">
            <div class="field__label-row">
              <label class="field__label" for="password">Contraseña</label>
              <a class="field__forgot" href=" {{ url_for('olvidar_contraseña') }}">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="field__wrap">
              <svg class="field__icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
                <rect x="3.5" y="8.5" width="13" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7 8.5V6a3 3 0 016 0v2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <circle cx="10" cy="13" r="1.2" fill="currentColor"/>
              </svg>
              <input class="field__input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="field__eye" onclick="togglePassword()" tabindex="-1">
                <svg id="eye-icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
                  <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </button>
            </div>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" name="remember">
            <span class="checkbox-custom"></span>
            <span class="checkbox-label">Recordar sesión</span>
          </label>

          <button type="submit" class="btn-submit">
            Entrar
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <path d="M4 10h12M12 6l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

        </form>

        <p class="register-link">
          ¿No tienes cuenta? <a href="{{ url_for('registrar') }}">Regístrate gratis</a>
        </p>

      </div>
    </div>

  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
