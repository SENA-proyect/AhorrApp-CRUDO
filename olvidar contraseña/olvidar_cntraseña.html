<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olvidar contraseña</title>
    <link rel="stylesheet" href="olvidar_contraseña.css">

</head>
<body>

    <h1>Restablecer contraseña</h1>

    <div class="container">

        <h2>Ahorrapp</h2>

        <h3>Introduce el correo electrónico asociado a tu cuenta y te enviaremos las instrucciones para restablecerla.</h3>

        <form action="" class="form">

            <div class="form_correo">

                <input type="email" placeholder="ingrese su correo electronico" class="correo" required>

            </div>

            <div class="form_button">

                <a class="salir" href="">Cancelar</a>
                <button class="enviar">enviar</button>

            </div>

    </div>
    

</body>
</html>
